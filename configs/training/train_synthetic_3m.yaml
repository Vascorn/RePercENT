wandb:
  project: "synthetic-new-3M"



disen_loss:
  alpha: 2.0
  lmd: 0.001
  lmd_start_value: 0.001
  lmd_end_value: 0.1
  lmd_n_iterations: 7000
  lmd_start_iteration: 500
  ortho_norm: true

optimizer:
  name: "adam"
  lr: 0.0001
  weight_decay: 0.00001



training:
  test_size: 0.2
  n_epochs: 80
  batch_size: 1024
  log_interval: 10
  augmentation: "random" # This includes all three augmentation types: noise, swap, random_drop
  