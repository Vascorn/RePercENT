wandb:
  project: "irfl-v2-3m"


disen_loss:
  alpha: 0.5
  lmd: 0.001
  lmd_start_value: 0.001
  lmd_end_value: 0
  lmd_n_iterations: 10000
  lmd_start_iteration: 5000
  ortho_norm: true
  recon: false


optimizer:
  name: "adam"
  lr: 0.0001
  weight_decay: 0.00001



training:
  test_size: 0.2
  n_epochs: 30
  batch_size: 512
  log_interval: 10
  augmentation: "random" # This includes all three augmentation types: noise, swap, random_drop