wandb:
  project: "synthetic-4M"



disen_loss:
  alpha: 0.5
  lmd: 0.001
  lmd_start_value: 0.001
  lmd_end_value: 0
  lmd_n_iterations: 10000
  lmd_start_iteration: 5000
  ortho_norm: true


optimizer:
  name: "adam"
  lr: 0.0008
  weight_decay: 0.00001



training:
  test_size: 0.2
  n_epochs: 50
  batch_size: 2048
  log_interval: 10
  augmentation: "random" # This includes all three augmentation types: noise, swap, random_drop
  