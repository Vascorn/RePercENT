wandb:
  project: "irfl-v2-2m"


disen_loss:
  alpha: 0.1
  lmd: 0.1
  lmd_start_value: 10.0
  lmd_end_value: 5
  lmd_n_iterations: 2000
  lmd_start_iteration: 300
  ortho_norm: true


optimizer:
  name: "adam"
  lr: 0.0008
  weight_decay: 0.00001



training:
  test_size: 0.2
  n_epochs: 35
  batch_size: 64
  log_interval: 10
  augmentation: "random" # This includes all three augmentation types: noise, swap, random_drop