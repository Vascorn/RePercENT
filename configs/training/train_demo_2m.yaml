disen_loss:
  alpha: 2
  lmd: 1.5
  lmd_start_value: 0.1
  lmd_end_value: 0
  lmd_n_iterations: 8000
  lmd_start_iteration: 800
  beta: 0.1
  ortho_norm: true

optimizer:
  name: "adam"
  lr: 0.001
  weight_decay: 0.00001



training:
  val_size: 0.1
  test_size: 0.2
  n_epochs: 5
  batch_size: 32
  log_interval: 10
  