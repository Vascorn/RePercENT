wandb:
  project: "synthetic-new-2M"

M: 2  # number of modalities

# Use the same model configuration for each modality, except for the positional encoding parameters and input channels which are modality-specific
shared_encoder:
  # the number of shared encoders is M * (M - 1)  -> M -1 shared components per modality
  type: "MLP" # MLP or GRU
  input_dims: [512, 512] # For the GRU is the feature dimension per time point, for the MLP is the total feature dimension as the input is flattened
  hidden_dims: [[128], [128]]
  latent_dims: [32, 32]
  num_layers: 1
  activation: "relu"


unique_encoder:
  # the number of unique encoders is M * (M - 1) -> M -1 unique components per modality
  type: "MLP" # MLP or GRU
  input_dims: [512, 512]
  hidden_dims: [[128], [128]]
  latent_dims: [32, 32]
  num_layers: 1
  activation: "relu"

vmfkappa: 1000
add_shared: false
