wandb:
  project: "synthetic-data-2-modalities"

# Use the same model configuration for each modality, except for the positional encoding parameters and input channels which are modality-specific
perceiver: 
  depth: 2 # Number of layers in the Perceiver model
  max_freq: null
  num_freq_bands: null
  input_channels: null
  input_axis: 1
  num_latents: 2 # Number of latent vectors, i.e. the number of disentangled factors to extract from each modality
  cross_heads: 2
  pos_encoding: true
  latent_dim: 16 # The dimension of each latent vector
  latent_heads: 1

repercent:
  M: 2 # Number of modalities
  disen_mapping:
    M_1:
      U_12: 0
      S_12: 1
    M_2:
      U_21: 0
      S_21: 1
  vmfkappa: 1e3