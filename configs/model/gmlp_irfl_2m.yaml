wandb:
  project: "irfl-v2-2m"

M: 2  # number of modalities

# Use the same model configuration for each modality, except for the positional encoding parameters and input channels which are modality-specific
shared_encoder:
  # the number of shared encoders is M * (M - 1)  -> M -1 shared components per modality

  # ---- GRU Encoder ----
  # type: "gru" # mlp, gmlp or gru
  # input_dims: [32, 32] # For the GRU is the feature dimension per time point, for the MLP is the total feature dimension as the input is flattened
  # hidden_dims: [[64], [64]]
  # latent_dims: [16, 16]
  # num_layers: 4
  # activation: "relu"

  # ---- MLP Encoder ----
  # type: "MLP" # gmlp or gru
  # input_dims: [256, 256] # For the GRU is the feature dimension per time point, for the MLP is the total feature dimension as the input is flattened
  # hidden_dims: [[128], [128]]
  # latent_dims: [16, 16]
  # activation: "relu"


  # ---- gMLP Encoder ----
  type: "gMLP" 
  d_model: [768, 512] # This corresponds to the d_model dimension in the gMLP implementation => token embedding dimension
  d_ff: [256, 256] # This corresponds to the Feedforward hidden dimension in the gMLP implementation
  proj_h: [[768, 256], [512, 256]] # Projection heads for the shared encoders to ensure output dimensions are the same across layers. Only relevant for gMLP case. In None, defaults to identity projections.
  seq_len: [49, 77] # This corresponds to the sequence length dimension in each gMLP block, and is modality-specific.
  num_layers: [2, 2] # number of gMLP layers per shared encoder


unique_encoder:
  # the number of unique encoders is M * (M - 1) -> M -1 unique components per modality
  # ---- GRU Encoder ----
  # type: "gru" # gmlp or gru
  # input_dims: [32, 32]
  # hidden_dims: [[64], [64]]
  # latent_dims: [16, 16]
  # num_layers: 4
  # activation: "relu"

  # ---- MLP Encoder ----
  # encoder_type: "MLP" # mlp, gmlp or gru
  # input_dims: [256, 256]
  # hidden_dims: [[128], [128]]
  # latent_dims: [16, 16]
  # activation: "relu"
 
  # ---- gMLP Encoder ----
  type: "gMLP" 
  d_model: [768, 512]
  d_ff: [256, 256]
  proj_h: [[768, 256], [512, 256]] # Projection heads for the unique encoders to ensure output dimensions are the same across layers. Only relevant for gMLP case. In None, defaults to identity projections.
  seq_len: [49, 77]
  num_layers: [2, 2] 


vmfkappa: 1000
add_shared: false