wandb:
  project: "honeybee-4m"

M: 4  # number of modalities

# Use the same model configuration for each modality, except for the positional encoding parameters and input channels which are modality-specific
shared_encoder:
  # the number of shared encoders is M * (M - 1)  -> M -1 shared components per modality

  # ---- GRU Encoder ----
  type: "gru" # mlp, gmlp or gru
  input_dims: [1024, 1024, 1024, 1024, 1024, 1024, 1024, 1024, 1024, 48, 48, 48] # For the GRU is the feature dimension per time point, for the MLP is the total feature dimension as the input is flattened
  hidden_dims: [[256], [256], [256], [256], [256], [256], [256], [256], [256], [256], [256], [256]]
  latent_dims: [256, 256, 256, 256, 256, 256, 256, 256, 256, 256, 256, 256]
  num_layers: 3
  activation: "relu"
  


unique_encoder:
  # the number of unique encoders is M * (M - 1) -> M -1 unique components per modality
  # ---- GRU Encoder ----
  type: "gru" # mlp, gmlp or gru
  input_dims: [1024, 1024, 1024, 1024, 1024, 1024, 1024, 1024, 1024, 48, 48, 48] # For the GRU is the feature dimension per time point, for the MLP is the total feature dimension as the input is flattened
  hidden_dims: [[256], [256], [256], [256], [256], [256], [256], [256], [256], [256], [256], [256]]
  latent_dims: [256, 256, 256, 256, 256, 256, 256, 256, 256, 256, 256, 256]
  num_layers: 3
  activation: "relu"



vmfkappa: 1000
add_shared: false