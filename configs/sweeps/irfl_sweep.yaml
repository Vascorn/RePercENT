method: 'random'
metric:
  name: 'best_val_loss'
  goal: 'minimize'

parameters:
  lr:
    distribution: 'log_uniform_values'
    min: 0.0001
    max: 0.05
  batch_size: 
    values: [16, 32, 64, 256, 512]
  num_epochs: 
    value: 50
  cross_heads: 
    values: [1, 2, 3]
  latent_heads: 
    values: [1, 2, 3]
  depth: 
    values: [2, 4, 6]
  weight_tie_layers: 
    values: [true, false]