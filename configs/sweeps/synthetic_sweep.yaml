
method: 'random'
metric:
  name: 'Val Loss - total'
  goal: 'minimize'
parameters:
  learning_rate:
    distribution: 'log_uniform'
    min: 0.0001
    max: 0.05
  batch_size: 
    values: [512, 1024, 2048]
  num_epochs: 
    value: 30
  cross_heads: 
    values: [1, 2, 3]
  latent_heads: 
    values: [1, 2, 3]
  depth: 
    values: [2, 3]
  lmd: 
    distribution: 'uniform'
    min: 0.1
    max: 1.0
  alpha: 
    distribution: 'uniform'
    min: 0.1
    max: 1.0