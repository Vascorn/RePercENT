sweep_config:
  method: 'random'
  metric:
    name: 'val_loss'
    goal: 'minimize'
  parameters:
    learning_rate:
      values: [0.001, 0.0005, 0.01]
    batch_size: 
      values: [512, 1024, 2048]
    num_epochs: 
      value: 30
    cross_heads: 
      values: [1, 2, 4]
    latent_heads: 
      values: [1, 2, 4]
    depth: 
      values: [2, 3, 4]
    lmd: 
      distribution: 'uniform'
      min: 0.1
      max: 1.0
    alpha: 
      distribution: 'uniform'
      min: 0.1
      max: 1.0